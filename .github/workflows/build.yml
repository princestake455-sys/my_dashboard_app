name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Compile Native Android Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Set up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Structure Native Deployment Targets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || cp dashboard-app/index.html www/ || true

      - name: Install Project Dependencies
        run: npm install

      - name: Inject Capacitor Platform Wrappers
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Compile Native Debug Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Export Executable Artifact Archive
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
